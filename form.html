<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üyelik Oluşturma</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LPQE3WQ38J"></script>

<script>
  window.dataLayer = window.dataLayer || [];

  function gtag(){
    dataLayer.push(arguments);
  }

  gtag('js', new Date());

  gtag('config', 'G-LPQE3WQ38J');
</script>
</head>
<body>
    <div class="ana">
        <h1>üyelik oluşturma ekranı</h1>
        <center>
            <form id="uyelikFormu">
                Üyelik Oluştur<br>
                <input type="text" placeholder="İsminizi giriniz..." name="isim" id="isim" required><br>
                <input type="password" placeholder="Şifre giriniz..." name="sifre" id="sifre" required><br>
                <button type="submit" id="gonderBtn">Gönder</button>
            </form><br>
        </center>
        
        <fieldset>
            <a href="oyun.html">oyun için tıkla</a><br>
            <a href="index.html">index'e dön</a><br>
            <a href="hakkinda.html">hakkında</a>
        </fieldset>
    </div>

    <!-- Explicit absolute script versioning handles loading directly on vanilla host pages -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // Your specific application dashboard credentials
        const firebaseConfig = {
            apiKey: "AIzaSyAhZp6WSQ_H2RjEJUSPg_5Yf887zcJVnLM",
            authDomain: "firebaseapp.com",
            projectId: "ornek-90891",
            storageBucket: "ornek-90891.firebasestorage.app",
            messagingSenderId: "393121025355",
            appId: "1:393121025355:web:1edad0a60602c6faaaecce"
        };

        // Initialize Firebase apps and Cloud Firestore instances
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Bind directly to the submit intercept trigger event
        document.getElementById('uyelikFormu').addEventListener('submit', async (e) => {
            e.preventDefault(); // CRITICAL: This explicitly blocks the URL query bar generation and page refresh

            const isimDegeri = document.getElementById('isim').value;
            const sifreDegeri = document.getElementById('sifre').value;

            try {
                // Adds fields safely straight into the dynamic document collection list
                const docRef = await addDoc(collection(db, "uyeler"), {
                    isim: isimDegeri,
                    sifre: sifreDegeri,
                    tarih: new Date()
                });
                
                alert("Üyelik başarıyla oluşturuldu!");
                document.getElementById('uyelikFormu').reset(); // Clear input boxes
            } catch (error) {
                console.error("Firestore Error: ", error);
                alert("Hata oluştu! Lütfen Firebase Console Test Modu kurallarını kontrol edin.");
            }
        });
    </script>
</body>
</html>
